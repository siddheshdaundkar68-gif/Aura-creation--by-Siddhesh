<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pricing - Siddhesh Daundkar</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background-color: #f5f1ea;
    color: #222;
    text-align: center;
}

header {
    padding: 50px;
    background: #efe9df;
}

h1 {
    margin: 0;
}

section {
    padding: 50px 10%;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
}

.price {
    font-size: 32px;
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #222;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    margin-top: 20px;
}

.btn:hover {
    background: #555;
}
</style>
</head>

<body>

<header>
    <h1>Pricing & Services</h1>
    <p>Siddhesh Daundkar</p>
</header>

<section>
    <div class="grid">

        <div class="card">
            <h2>📸 Product Images</h2>
            <p>5 Professional AI-generated product images</p>
            <div class="price">₹2500</div>
        </div>

        <div class="card">
            <h2>🎥 UGC Videos</h2>
            <p>5 High-quality UGC ad videos</p>
            <div class="price">₹4500</div>
        </div>

    </div>

    <a href="index.html" class="btn">← Back to home</a>
</section>

</body>
</html>
